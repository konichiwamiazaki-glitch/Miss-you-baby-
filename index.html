<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Baby ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #ffd3eb, #d3e0ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Ek dam gol aur moti writing ke liye font applied */
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.92);
            padding: 45px 30px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.3);
            border: 5px solid #fff;
            max-width: 95%;
            width: 580px;
            animation: bounceIn 1.2s ease;
            z-index: 10;
            position: relative;
        }
        h1 {
            color: #ff5e97;
            font-size: 2.8rem; /* Kafi bada aur bold heading */
            margin-bottom: 35px;
            text-shadow: 3px 3px 0px #fff;
            font-weight: 700;
        }
        .message-box {
            color: #5c527f;
            font-size: 1.5rem; /* Mota aur bada text */
            line-height: 2.2;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            font-weight: 600;
        }
        
        /* Hawa me tairte hue lines order me */
        .floating-line {
            display: block;
            animation: floatUpDown 4s infinite ease-in-out;
        }
        .floating-line:nth-child(1) { animation-delay: 0s; }
        .floating-line:nth-child(2) { animation-delay: 0.4s; }
        .floating-line:nth-child(3) { animation-delay: 0.8s; }
        .floating-line:nth-child(4) { animation-delay: 1.2s; }
        .floating-line:nth-child(5) { animation-delay: 1.6s; }
        .floating-line:nth-child(6) { animation-delay: 2s; }
        .floating-line:nth-child(7) { animation-delay: 2.4s; }

        .heart-btn {
            background: linear-gradient(45deg, #ff6b8b, #ff8eaf);
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 25px rgba(255, 107, 139, 0.5);
            border: 3px solid #fff;
        }
        .heart-btn:hover {
            transform: scale(1.1);
        }

        /* Final Surprise Message */
        .secret-message {
            display: none;
            font-size: 3.2rem; /* Ek dam bada aur mast mota text */
            color: #ff3366;
            text-shadow: 4px 4px 0px #fff;
            font-weight: 700;
            animation: popOpen 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Background items */
        .floating-item {
            position: absolute;
            bottom: -10%;
            animation: floatUpAnimation 4s linear infinite;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); } /* Smooth floating motion */
        }

        @keyframes popOpen {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
